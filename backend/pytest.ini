[pytest]
testpaths = tests
asyncio_mode = auto
markers =
    postgres_integration: requires TEST_POSTGRES_URL pointing to a disposable PostgreSQL test database
filterwarnings =
    ignore:Using .*starlette.testclient.* is deprecated:Warning
    ignore:.*asyncio.get_event_loop_policy.*:DeprecationWarning
    ignore:.*asyncio.set_event_loop_policy.*:DeprecationWarning
    ignore:.*asyncio.iscoroutinefunction.*:DeprecationWarning
